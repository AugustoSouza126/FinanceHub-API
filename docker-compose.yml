services:
    postgres:
        image: postgres:17-alpine
        container_name: financehub-postgres

        environment:
            POSTGRES_DB: financehub
            POSTGRES_USER: financehub
            POSTGRES_PASSWORD: financehub

        ports:
            - "5432:5432"

        volumes:
            - postgres_data:/var/lib/postgresql/data

        restart: unless-stopped

volumes:
    postgres_data:
